<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Masters Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0b0e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eee;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            pointer-events: none;
        }
        h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }
        p {
            margin: 0 0 20px 0;
            font-size: 13px;
            color: #8a8a9a;
        }
        .panel {
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        .color-selector {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .color-swatch:hover {
            transform: scale(1.15);
        }
        .color-swatch.active {
            border-color: #fff;
            transform: scale(1.1);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div class="panel">
            <h1>Block Masters</h1>
            <p>Truncated Octahedron Lattice Prototype</p>
            <div>Select Active Block Color:</div>
            <div class="color-selector" id="color-selector">
                <div class="color-swatch active" style="background-color: #00ff88;" data-color="green"></div>
                <div class="color-swatch" style="background-color: #ff3366;" data-color="red"></div>
                <div class="color-swatch" style="background-color: #3399ff;" data-color="blue"></div>
                <div class="color-swatch" style="background-color: #ffcc00;" data-color="gold"></div>
                <div class="color-swatch" style="background-color: #b800ff;" data-color="purple"></div>
            </div>
        </div>
    </div>

    <div id="instructions">
        🖱️ Left Click + Drag to Rotate Camera | 🔍 Scroll to Zoom | 🧱 Click Face to Place Block
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Core App State
        let activeColor = 'green';
        const colorMap = {
            green: 0x00ff88,
            red: 0xff3366,
            blue: 0x3399ff,
            gold: 0xffcc00,
            purple: 0xb800ff
        };

        // UI Color Selection setup
        const swatches = document.querySelectorAll('.color-swatch');
        swatches.forEach(swatch => {
            swatch.addEventListener('click', () => {
                swatches.forEach(s => s.classList.remove('active'));
                swatch.classList.add('active');
                activeColor = swatch.getAttribute('data-color');
            });
        });

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0d);

        // Camera Setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 10, 15);

        // Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Controls Setup
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Limit below ground slightly

        // Lighting Setup
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x3399ff, 0.3);
        fillLight.position.set(-10, -5, -10);
        scene.add(fillLight);

        // Add Grid Helper/Ground
        const gridHelper = new THREE.GridHelper(40, 40, 0x00ff88, 0x1f1f2e);
        gridHelper.position.y = -5;
        scene.add(gridHelper);

        // Raycasting for click placement
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Input Pointer tracking to distinguish camera panning from clean clicks
        let pointerDownX = 0;
        let pointerDownY = 0;
        const dragThresholdMouse = 8;     // pixels of wiggle allowed for mouse
        const dragThresholdTouch = 25;    // pixels of wiggle allowed for touchscreen/mobile fingers

        // Geometry cache
        let singleCellGeometry;
        const placedMeshes = [];

        // Fetch truncated octahedron geometry from server
        async function fetchGeometry() {
            const response = await fetch('/api/geometry');
            const data = await response.json();

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            const indices = [];

            data.vertices.forEach(v => vertices.push(...v));
            data.faces.forEach(face => {
                for (let i = 1; i < face.length - 1; i++) {
                    indices.push(face[0], face[i], face[i + 1]);
                }
            });

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            geometry.setIndex(indices);
            geometry.computeVertexNormals();

            return geometry;
        }

        // Fetch and render the entire lattice of blocks
        async function loadLattice() {
            const response = await fetch('/api/lattice');
            const blocks = await response.json();

            // Clear old meshes
            placedMeshes.forEach(mesh => scene.remove(mesh));
            placedMeshes.length = 0;

            if (!singleCellGeometry) {
                singleCellGeometry = await fetchGeometry();
            }

            blocks.forEach(block => {
                // Create solid mesh
                const colorHex = colorMap[block.color] || 0x00ff88;
                const material = new THREE.MeshPhongMaterial({
                    color: colorHex,
                    shininess: 30,
                    flatShading: true,
                    side: THREE.DoubleSide
                });

                const mesh = new THREE.Mesh(singleCellGeometry, material);
                mesh.position.set(...block.center);
                mesh.castShadow = true;
                mesh.receiveShadow = true;

                // Attach metadata so we know the lattice coordinates
                mesh.userData = {
                    coord: block.coord,
                    color: block.color
                };

                // Add nice black outlines to distinguish faces
                const edgesGeometry = new THREE.EdgesGeometry(singleCellGeometry);
                const lineMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
                const wireframe = new THREE.LineSegments(edgesGeometry, lineMaterial);
                mesh.add(wireframe);

                scene.add(mesh);
                placedMeshes.push(mesh);
            });
        }

        // Handle user clicks or taps to place blocks
        async function onCanvasClick(event) {
            // Only trigger placement if click was directly on the canvas, not on UI overlays
            if (event.target.tagName !== 'CANVAS') return;

            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect with placed meshes (strictly non-recursive to ignore wireframe lines)
            const intersects = raycaster.intersectObjects(placedMeshes, false);

            if (intersects.length > 0) {
                const intersection = intersects[0];
                const clickedMesh = intersection.object;
                
                // Retrieve clicked block coordinate
                const clickedCoord = clickedMesh.userData.coord;

                // Calculate clicked normal vector in local space
                const localNormal = intersection.face.normal.clone().normalize();

                // Mathematical Maximum Dot Product Classifier:
                // Compare the local normal to all 14 possible neighbor directions.
                // The direction with the highest dot product is the exact clicked face.
                const directions = [
                    // 6 Square Face offsets & normalized directions
                    { offset: [2, 0, 0], dir: [1, 0, 0] },
                    { offset: [-2, 0, 0], dir: [-1, 0, 0] },
                    { offset: [0, 2, 0], dir: [0, 1, 0] },
                    { offset: [0, -2, 0], dir: [0, -1, 0] },
                    { offset: [0, 0, 2], dir: [0, 0, 1] },
                    { offset: [0, 0, -2], dir: [0, 0, -1] },
                    // 8 Hexagon Face offsets & normalized directions
                    { offset: [1, 1, 1], dir: [1/Math.sqrt(3), 1/Math.sqrt(3), 1/Math.sqrt(3)] },
                    { offset: [1, 1, -1], dir: [1/Math.sqrt(3), 1/Math.sqrt(3), -1/Math.sqrt(3)] },
                    { offset: [1, -1, 1], dir: [1/Math.sqrt(3), -1/Math.sqrt(3), 1/Math.sqrt(3)] },
                    { offset: [1, -1, -1], dir: [1/Math.sqrt(3), -1/Math.sqrt(3), -1/Math.sqrt(3)] },
                    { offset: [-1, 1, 1], dir: [-1/Math.sqrt(3), 1/Math.sqrt(3), 1/Math.sqrt(3)] },
                    { offset: [-1, 1, -1], dir: [-1/Math.sqrt(3), 1/Math.sqrt(3), -1/Math.sqrt(3)] },
                    { offset: [-1, -1, 1], dir: [-1/Math.sqrt(3), -1/Math.sqrt(3), 1/Math.sqrt(3)] },
                    { offset: [-1, -1, -1], dir: [-1/Math.sqrt(3), -1/Math.sqrt(3), -1/Math.sqrt(3)] }
                ];

                let maxDot = -Infinity;
                let bestDirection = null;

                directions.forEach(d => {
                    const dot = localNormal.x * d.dir[0] + localNormal.y * d.dir[1] + localNormal.z * d.dir[2];
                    if (dot > maxDot) {
                        maxDot = dot;
                        bestDirection = d;
                    }
                });

                const faceDirection = bestDirection.offset;

                console.log(`[Interaction] Tapped mesh: coord=${clickedCoord}, faceNormal=(${localNormal.x.toFixed(3)}, ${localNormal.y.toFixed(3)}, ${localNormal.z.toFixed(3)})`);
                console.log(`[Interaction] Classified direction: offset=${faceDirection}, dot=${maxDot.toFixed(3)}`);

                // Send placement request to Flask server
                const payload = {
                    coord: clickedCoord,
                    face_direction: faceDirection,
                    color: activeColor
                };

                try {
                    const response = await fetch('/api/lattice/place', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        // Reload lattice to reflect new state
                        await loadLattice();
                    } else {
                        const errData = await response.json();
                        console.error("Lattice placement error:", errData.error);
                    }
                } catch (err) {
                    console.error("Failed to connect to placement API:", err);
                }
            } else {
                console.log("[Interaction] Raycast missed all meshes.");
            }
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Window Resize Handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Track pointer start location (Use capturing phase to guarantee execution before OrbitControls)
        window.addEventListener('pointerdown', (event) => {
            pointerDownX = event.clientX;
            pointerDownY = event.clientY;
        }, true);

        // Distinguish drag from clean click/touch-tap (Use capturing phase to avoid ingestion blocks)
        window.addEventListener('pointerup', (event) => {
            const distance = Math.sqrt(
                Math.pow(event.clientX - pointerDownX, 2) +
                Math.pow(event.clientY - pointerDownY, 2)
            );
            
            // Touch gestures wiggle a lot more than cursor clicks
            const threshold = event.pointerType === 'touch' ? dragThresholdTouch : dragThresholdMouse;
            
            console.log(`[Input] PointerUp: type=${event.pointerType}, movement=${distance.toFixed(1)}px, threshold=${threshold}px`);
            
            // Only trigger placement if the pointer was static (clean click/tap)
            if (distance < threshold) {
                onCanvasClick(event);
            } else {
                console.log("[Input] Drag detected. Ignoring block placement.");
            }
        }, true);

        // Bootstrapping
        loadLattice().then(() => {
            animate();
        }).catch(err => {
            console.error("Failed to initialize Block Masters rendering engine:", err);
        });
    </script>
</body>
</html>
